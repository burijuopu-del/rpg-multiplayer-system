<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <div class="site-brand">
    <div class="site-brand-title">Quest Master: IRL Adventures</div>
    </div>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="ambient ambient-1"></div>
    <div class="ambient ambient-2"></div>
    <div class="ambient ambient-3"></div>

    <div class="app-shell">
        <header class="hero-panel" id="heroPanel"></header>

        <nav class="nav-tabs">
            <button class="tab-btn active" data-tab="quests">📜 Quêtes</button>
            <button class="tab-btn" data-tab="players">👥 Joueurs</button>
            <button class="tab-btn" data-tab="raids">⚔️ Raids</button>
            <button class="tab-btn" data-tab="social">💬 Social</button>
            <button class="tab-btn" data-tab="admin">⚙️ Admin</button>
        </nav>

        <main class="main-content">
            <!-- QUÊTES -->
            <section class="tab-content active" id="quests-tab">
                <div class="section-header">
                    <div>
                        <h2>📜 Quêtes du Jour</h2>
                        <p class="section-subtitle" id="seasonBadge">Saison</p>
                    </div>
                    <div class="quest-filter">
                        <button class="filter-btn active" data-filter="all">🎯 Toutes</button>
                        <button class="filter-btn" data-filter="easy">✨ Faciles</button>
                        <button class="filter-btn" data-filter="hard">🔥 Difficiles</button>
                    </div>
                </div>
                <div class="quests-grid" id="questsContainer"></div>
            </section>

            <!-- JOUEURS -->
            <section class="tab-content" id="players-tab">
                <div class="section-header">
                    <h2>👥 Joueurs</h2>
                    <button class="btn-primary" onclick="openAddPlayerModal()">➕ Ajouter</button>
                </div>
                <div class="players-grid" id="playersContainer"></div>
            </section>

            <!-- RAIDS -->
            <section class="tab-content" id="raids-tab">
                <div class="section-header">
                    <h2>⚔️ Raids</h2>
                    <button class="btn-primary" onclick="openCreateRaidModal()">➕ Raid</button>
                </div>
                <div class="raids-grid" id="raidsContainer"></div>
            </section>

            <!-- SOCIAL -->
            <section class="tab-content" id="social-tab">
                <div class="social-grid">
                    <div class="social-card">
                        <h3>🌍 Chat Global</h3>
                        <div class="chat-messages" id="chatMessages"></div>
                        <div class="chat-input-row">
                            <input id="chatInput" type="text" placeholder="Message..." maxlength="200">
                            <button class="btn-primary" onclick="sendChat()">📤</button>
                        </div>
                    </div>
                    <div class="social-card">
                        <h3>🧾 Logs</h3>
                        <div id="logsContainer" class="log-list"></div>
                    </div>
                </div>
            </section>

            <!-- ADMIN -->
            <section class="tab-content" id="admin-tab">
                <div class="section-header">
                    <h2>⚙️ Panneau Admin</h2>
                </div>
                <div id="adminContent"></div>
            </section>
        </main>

<footer class="site-footer">
    <span> 🎮 Quest Master </span>
</footer>
</div>
    </div>

    <!-- MODAUX -->
    <div id="addPlayerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAddPlayerModal()">&times;</span>
            <h2>➕ Nouveau Joueur</h2>
            <input id="playerName" type="text" placeholder="Nom" maxlength="30">
            <select id="playerClass">
                <option value="warrior">⚔️ Guerrier</option>
                <option value="mage">🔮 Mage</option>
                <option value="archer">🏹 Archer</option>
                <option value="paladin">✨ Paladin</option>
            </select>
            <button class="btn-primary" onclick="addPlayer()">Créer</button>
        </div>
    </div>

    <div id="createRaidModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCreateRaidModal()">&times;</span>
            <h2>⚔️ Créer Raid</h2>
            <input id="raidName" type="text" placeholder="Nom du raid" maxlength="50">
            <label>Difficulté</label>
            <select id="raidDifficulty">
                <option value="3">3 étages</option>
                <option value="5">5 étages</option>
                <option value="10">10 étages</option>
            </select>
            <div id="raidPlayersList"></div>
            <button class="btn-primary" onclick="createRaid()">Créer</button>
        </div>
    </div>
</section>
    <script src="script.js"></script>
</body>
</html>
